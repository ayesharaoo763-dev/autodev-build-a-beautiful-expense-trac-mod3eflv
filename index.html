<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <meta name="description" content="Expense Tracker App">
    <meta property="og:title" content="Expense Tracker">
    <meta property="og:description" content="Expense Tracker App">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Expense Tracker</h1>
    </header>
    <main>
        <section class="summary">
            <h2>Summary</h2>
            <div class="balance">
                <p>Balance: <span id="balance">$0</span></p>
            </div>
            <div class="income-expense">
                <p>Income: <span id="income">$0</span></p>
                <p>Expense: <span id="expense">$0</span></p>
            </div>
        </section>
        <section class="add-transaction">
            <h2>Add Transaction</h2>
            <form id="transaction-form">
                <label for="type">Type:</label>
                <select id="type" name="type">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
                <label for="category">Category:</label>
                <select id="category" name="category">
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Health">Health</option>
                    <option value="Other">Other</option>
                </select>
                <label for="amount">Amount:</label>
                <input type="number" id="amount" name="amount">
                <label for="date">Date:</label>
                <input type="date" id="date" name="date">
                <button id="add-transaction-btn">Add Transaction</button>
            </form>
        </section>
        <section class="transaction-history">
            <h2>Transaction History</h2>
            <ul id="transaction-list">
            </ul>
        </section>
        <section class="chart">
            <h2>Category Distribution</h2>
            <canvas id="chart-canvas"></canvas>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
